<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard - Postgres coscloud_prod</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; background:#f4f6f8; margin:0; padding:24px; color:#1a1a1a;}
  h1 { font-size:20px; margin-bottom:4px;}
  .subtitle { color:#666; margin-bottom:24px; font-size:13px;}
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; max-width:1200px; margin:0 auto;}
  .card { background:white; border-radius:10px; padding:18px; box-shadow:0 1px 4px rgba(0,0,0,0.1);}
  .card h2 { font-size:14px; margin:0 0 12px 0; color:#2c3e50;}
  .kpis { display:grid; grid-template-columns: repeat(4,1fr); gap:14px; max-width:1200px; margin:0 auto 20px auto;}
  .kpi { background:white; border-radius:10px; padding:16px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.1);}
  .kpi .value { font-size:26px; font-weight:700; }
  .kpi .label { font-size:12px; color:#777; margin-top:4px;}
  .ok { color:#2e8b57; } .warn { color:#e0a800; } .bad { color:#c0392b; }
  .empty { text-align:center; color:#888; padding:60px 0; max-width:1200px; margin:0 auto;}
  #gate { max-width:340px; margin:120px auto; background:white; padding:28px; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,0.15); text-align:center;}
  #gate input { width:100%; padding:10px; margin:14px 0; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; font-size:14px;}
  #gate button { width:100%; padding:10px; background:#2c7be5; color:white; border:none; border-radius:6px; font-size:14px; cursor:pointer;}
  #gate .err { color:#c0392b; font-size:12px; min-height:16px; }
  #app { display:none; }
</style>
</head>
<body>

<div id="gate">
  <h2>Acceso al dashboard</h2>
  <input type="password" id="gatePass" placeholder="Contraseña" onkeydown="if(event.key==='Enter') checkGate()">
  <button onclick="checkGate()">Entrar</button>
  <div class="err" id="gateErr"></div>
</div>

<div id="app">
<h1>Dashboard - Postgres coscloud_prod</h1>
<div class="subtitle" id="subtitle">Se actualiza cada vez que corres check_coscloud_pg.sh</div>

<div id="content"></div>
</div>

<script>
const HISTORICO = [
  {ts:"2026-06-30 13:31:36", activas:131, total:200, maxconn:500, locks:57, load1:45.40, load5:46.06, load15:45.28},
  {ts:"2026-06-30 14:36:26", activas:107, total:180, maxconn:500, locks:70, load1:27.30, load5:30.71, load15:29.74},
  {ts:"2026-06-30 15:02:40", activas:84, total:132, maxconn:500, locks:61, load1:17.36, load5:22.06, load15:25.04},
  {ts:"2026-06-30 15:20:39", activas:39, total:111, maxconn:500, locks:14, load1:26.81, load5:27.41, load15:26.79},
];

const DASH_PASSWORD = "dcpcfix123*";

function checkGate() {
  const val = document.getElementById('gatePass').value;
  if (val === DASH_PASSWORD) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('dash_ok', '1');
  } else {
    document.getElementById('gateErr').textContent = 'Contraseña incorrecta';
  }
}

if (sessionStorage.getItem('dash_ok') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

const content = document.getElementById('content');
const subtitle = document.getElementById('subtitle');

if (HISTORICO.length === 0) {
  content.innerHTML = '<div class="empty">Todavia no hay datos. Corre check_coscloud_pg.sh para generar el primer registro.</div>';
} else {
  const last = HISTORICO[HISTORICO.length - 1];
  subtitle.textContent = 'Ultima actualizacion: ' + last.ts + ' | Registros historicos: ' + HISTORICO.length;

  const kpiClass = (val, warnT, badT) => val >= badT ? 'bad' : (val >= warnT ? 'warn' : 'ok');

  content.innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="value ${kpiClass(last.activas,50,150)}">${last.activas}</div><div class="label">Conexiones activas</div></div>
      <div class="kpi"><div class="value ${kpiClass(last.locks,5,30)}">${last.locks}</div><div class="label">Locks sin otorgar</div></div>
      <div class="kpi"><div class="value">${last.total} / ${last.maxconn}</div><div class="label">Conexiones totales / max</div></div>
      <div class="kpi"><div class="value ${kpiClass(last.load1,16,32)}">${last.load1}</div><div class="label">Load average (1 min)</div></div>
    </div>
    <div class="grid">
      <div class="card"><h2>Conexiones activas y locks en el tiempo</h2><canvas id="chartConn"></canvas></div>
      <div class="card"><h2>Load average en el tiempo</h2><canvas id="chartLoad"></canvas></div>
    </div>
  `;

  const labels = HISTORICO.map(r => r.ts);

  new Chart(document.getElementById('chartConn'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Conexiones activas', data: HISTORICO.map(r=>r.activas), borderColor:'#2c7be5', tension:0.2 },
        { label: 'Locks sin otorgar', data: HISTORICO.map(r=>r.locks), borderColor:'#e0a800', tension:0.2 }
      ]
    },
    options: { responsive:true, plugins:{legend:{position:'bottom'}} }
  });

  new Chart(document.getElementById('chartLoad'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Load avg 1min', data: HISTORICO.map(r=>r.load1), borderColor:'#c0392b', tension:0.2 },
        { label: 'Load avg 5min', data: HISTORICO.map(r=>r.load5), borderColor:'#8e44ad', tension:0.2 },
        { label: 'Load avg 15min', data: HISTORICO.map(r=>r.load15), borderColor:'#16a085', tension:0.2 }
      ]
    },
    options: { responsive:true, plugins:{legend:{position:'bottom'}} }
  });
}
</script>
</body>
</html>
